name: Deploy API to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/259958861423/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@coach-8413d.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy coach-claude \
            --source . \
            --region us-east1 \
            --allow-unauthenticated \
            --port 8080 \
            --project coach-8413d
