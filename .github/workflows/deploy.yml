name: Deploy Coach Claude

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/259958861423/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@coach-8413d.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy coach-claude \
            --source . \
            --region us-east1 \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars PUBLIC_URL=https://irlll.com \
            --project coach-8413d

  deploy-web:
    name: Deploy Homepage to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/259958861423/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions@coach-8413d.iam.gserviceaccount.com

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        working-directory: web
        run: firebase deploy --only hosting --project coach-8413d
