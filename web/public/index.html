<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coach Claude</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #888;
      text-align: center;
      max-width: 420px;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      margin-right: 0.5rem;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    .try-btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #4ade80;
      color: #0a0a0a;
      font-weight: 700;
      font-size: 1rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .try-btn:hover { opacity: 0.85; }

    .signin-link {
      display: block;
      margin-top: 0.85rem;
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }
    .signin-link:hover { color: #888; }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="logo">Coach Claude</div>
  <p class="tagline">
    <span class="dot"></span>Real-time cycling performance analytics, delivered to your phone.
  </p>
  <a id="try-btn" href="#" class="try-btn">Try it</a>
  <a id="signin-link" href="#" class="signin-link">Sign in</a>
  <script>
    document.getElementById('try-btn').href = '/signup';
    document.getElementById('signin-link').href = '/login';
  </script>
  <footer>&copy; 2026 Coach Claude &mdash; nikliolios@irlll.com</footer>
</body>
</html>
